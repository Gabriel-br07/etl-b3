# =============================================================================
# compose.yaml — etl-b3 stack
# =============================================================================
#
# Architecture: db + scheduler (Prefect) + API (default) + optional full-stack worker.
#
#   db         — TimescaleDB (PostgreSQL 16) with persistent named volume
#   scheduler  — Prefect orchestration (canonical runtime):
#                  ENTRYPOINT entrypoint.sh → optional bootstrap →
#                  CMD: python -m app.etl.orchestration.prefect.serve
#                  Deployments: daily-registry (08:00 America/Sao_Paulo), intraday-quotes (interval).
#                  See docs/architecture.md
#   api        — FastAPI HTTP API (starts with default `docker compose up -d`)
#                  Scalar docs at http://localhost:8000/scalar
#   cotahist   — one-shot annual COTAHIST fetch+load (profile full or cotahist)
#                  Same image as scheduler; shares scraper_data; does not run Alembic.
#                  Depends only on db (healthy); worker waits for fact_cotahist_daily.
#
# Startup sequence:
#   db starts → healthcheck passes → scheduler + api start
#   ENTRYPOINT entrypoint.sh  (runs as root – chowns /app/data → bootstrap as scraper → exec CMD)
#   CMD        Prefect serve (see Dockerfile command; runs as scraper uid 1001)
#
# Quick start:
#   docker compose build
#   docker compose up -d                        # db + scheduler + api
#   docker compose --profile full run --rm cotahist   # heavy / full data stack (COTAHIST)
#   docker compose logs -f scheduler
#
# Run migrations manually (first time or after schema changes):
#   docker compose exec scheduler /app/.venv/bin/alembic upgrade head
#
# Manual triggers (while running):
#   docker compose exec scheduler /app/docker/run_daily_batch.sh
#   docker compose exec scheduler /app/.venv/bin/python /app/scripts/run_etl.py
#   docker compose exec scheduler /app/.venv/bin/python /app/scripts/run_b3_quote_batch.py
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database: PostgreSQL 16 + TimescaleDB 2.x
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: etlb3_db
    environment:
      POSTGRES_DB: etlb3
      POSTGRES_USER: etlb3
      POSTGRES_PASSWORD: etlb3pass
      TZ: America/Sao_Paulo
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      # Expose on localhost only – useful for local psql / DBeaver access
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlb3 -d etlb3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Scheduler: Playwright scrapers + ETL pipeline
  # ---------------------------------------------------------------------------
  scheduler:
    image: etlb3_scheduler:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etlb3_scheduler
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_SLOW_MO: "0"
      # Prefect schedules (America/Sao_Paulo — see app/etl/orchestration/prefect/serve.py)
      PREFECT_DAILY_REGISTRY_CRON: "0 8 * * *"
      PREFECT_INTRADAY_INTERVAL_MINUTES: "30"
      # B3 session window for intraday flow (update when B3 circulars change)
      B3_EQUITIES_SESSION_OPEN: "10:00"
      B3_EQUITIES_SESSION_CLOSE: "17:00"
      B3_QUOTE_WINDOW_PADDING_BEFORE_MINUTES: "10"
      B3_QUOTE_WINDOW_PADDING_AFTER_MINUTES: "10"
      B3_MARKET_TIMEZONE: "America/Sao_Paulo"
      # CSV discovery retry settings (scrapers / resolvers)
      RETRY_COUNT: "3"
      RETRY_DELAY_SECONDS: "60"
      # Data directories (must match entrypoint.sh logic)
      B3_DATA_DIR: /app/data/raw
      B3_OUTPUT_DIR: /app/data/raw
      B3_SCREENSHOTS_DIR: /app/data/screenshots
      B3_TRACE_DIR: /app/data/traces
      # Non-root user home — useradd -r defaults to /root; override so
      # Prefect (and any other tool) never writes to /root/.prefect
      HOME: /home/scraper
      PREFECT_HOME: /home/scraper/.prefect
      PREFECT_PROFILES_PATH: /home/scraper/.prefect/profiles.toml
      # Ensure Python can import the top-level `app` package
      PYTHONPATH: /app
      # Force UTF-8 mode — prevents encoding mismatches between local (Windows)
      # and Docker (Linux) when reading B3 CSV files.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      # Database connection — "db" is the Compose service name
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      # Connection pool
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      # Logging
      LOG_LEVEL: INFO
      # Skip light bootstrap if today’s cadastro CSV already exists (reduces overlap with 08:00 cron)
      SKIP_STACK_BOOTSTRAP_IF_FRESH: "true"
    shm_size: "1gb"
    volumes:
      - scraper_data:/app/data
    # Prefect-first command: serve recurring deployments only
    command: ["/app/.venv/bin/python", "-m", "app.etl.orchestration.prefect.serve"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"app\\.etl\\.orchestration\\.prefect\\.serve\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API: FastAPI HTTP interface (default stack)
  #
  # Usage:
  #   docker compose up -d
  #   curl http://localhost:8000/health
  #   open http://localhost:8000/scalar
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: etlb3_api
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      TZ: America/Sao_Paulo
      APP_ENV: production
      # Database connection — "db" is the Compose service name
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      # Shared data volume so the API can read raw files for /etl/run-latest
      B3_DATA_DIR: /app/data/raw
      LOG_LEVEL: INFO
      HOME: /home/scraper
      # Ensure Python can import the top-level `app` package
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - scraper_data:/app/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/app/.venv/bin/python -c \"import sys, urllib.request; r = urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0 if r.status == 200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # COTAHIST: annual ZIP fetch + load (full / expanded data stack)
  #
  # One-shot container (restart: no) — not a long-running sidecar. Command runs
  # full_stack_bootstrap (marker-gated) which delegates to cotahist_worker.py.
  # Profiles: `full` (preferred) or `cotahist` (backward compatible alias).
  #
  #   docker compose --profile full run --rm cotahist   # explicit (preferred)
  #   docker compose --profile full up -d             # starts one-shot once per up
  # ---------------------------------------------------------------------------
  cotahist:
    profiles: [full, cotahist]
    image: etlb3_scheduler:local
    container_name: etlb3_cotahist
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      B3_DATA_DIR: /app/data/raw
      B3_COTAHIST_ANNUAL_DIR: /app/data/raw/b3/cotahist_annual
      HOME: /home/scraper
      PREFECT_HOME: /home/scraper/.prefect
      PREFECT_PROFILES_PATH: /home/scraper/.prefect/profiles.toml
      PYTHONPATH: /app
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      COTAHIST_LOCK_KEY_1: "4242"
      COTAHIST_LOCK_KEY_2: "1"
      LOG_LEVEL: INFO
      RUN_FULL_STACK_BOOTSTRAP: "true"
      STACK_FULL_BOOTSTRAP_MARKER: /app/data/.bootstrap_full_v1.done
    volumes:
      - scraper_data:/app/data
    entrypoint: ["/app/docker/entrypoint_cotahist.sh"]
    command:
      [
        "/app/.venv/bin/python",
        "-m",
        "app.etl.orchestration.prefect.full_stack_bootstrap",
      ]
    restart: "no"

volumes:
  db_data:
    driver: local
  scraper_data:
    driver: local
