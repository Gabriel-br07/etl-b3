# =============================================================================
# compose.yaml — etl-b3 stack
# =============================================================================
#
# Architecture: TWO core services + optional API + optional COTAHIST worker.
#
#   db         — TimescaleDB (PostgreSQL 16) with persistent named volume
#   scheduler  — Prefect-first ETL orchestration (canonical runtime):
#                  ENTRYPOINT entrypoint.sh → CMD: python -m app.etl.orchestration.prefect.serve
#                  Serves daily_scraping_flow (+ cotahist-on-demand). See docs/etl_canonical_runtime.md
#                  Manual: run_prefect_daily_flow.py, run_etl.py, legacy docker/scheduler.py (docs/legacy_scheduler.md)
#   api        — FastAPI HTTP API (optional — enable with --profile api)
#                  Scalar docs at http://localhost:8000/scalar
#   cotahist   — one-shot fetch + load annual COTAHIST (optional — profile cotahist)
#                  Same image as scheduler; shares scraper_data; does not run Alembic.
#                  Depends only on db (healthy); worker waits for fact_cotahist_daily — no scheduler coupling.
#
# Startup sequence:
#   db starts → healthcheck passes → scheduler (and optionally api) start
#   ENTRYPOINT entrypoint.sh  (runs as root – chowns /app/data → exec scraper)
#   CMD        Prefect serve (see Dockerfile command; runs as scraper uid 1001)
#
# Quick start:
#   docker compose build
#   docker compose up -d                        # db + scheduler only
#   docker compose --profile api up -d         # db + scheduler + API
#   docker compose --profile cotahist up -d    # unprofiled services + cotahist (typically db+scheduler+cotahist)
#   docker compose logs -f scheduler
#
# Run migrations manually (first time or after schema changes):
#   docker compose exec scheduler /app/.venv/bin/alembic upgrade head
#
# Manual triggers (while running):
#   docker compose exec scheduler /app/docker/run_daily_batch.sh
#   docker compose exec scheduler /app/.venv/bin/python /app/scripts/run_etl.py
#   docker compose exec scheduler /app/.venv/bin/python /app/scripts/run_b3_quote_batch.py
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Database: PostgreSQL 16 + TimescaleDB 2.x
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: etlb3_db
    environment:
      POSTGRES_DB: etlb3
      POSTGRES_USER: etlb3
      POSTGRES_PASSWORD: etlb3pass
      TZ: America/Sao_Paulo
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      # Expose on localhost only – useful for local psql / DBeaver access
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etlb3 -d etlb3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Scheduler: Playwright scrapers + ETL pipeline
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etlb3_scheduler
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_SLOW_MO: "0"
      # Pipeline schedule
      DAILY_RUN_HOUR: "20"
      DAILY_RUN_MINUTE: "0"
      # Intraday loop interval (seconds) — 1800 = 30 minutes (updated)
      SCRAPER_INTERVAL_SECONDS: "1800"
      # CSV discovery retry settings
      RETRY_COUNT: "3"
      RETRY_DELAY_SECONDS: "60"
      # Data directories (must match entrypoint.sh logic)
      B3_DATA_DIR: /app/data/raw
      B3_OUTPUT_DIR: /app/data/raw
      B3_SCREENSHOTS_DIR: /app/data/screenshots
      B3_TRACE_DIR: /app/data/traces
      # Non-root user home — useradd -r defaults to /root; override so
      # Prefect (and any other tool) never writes to /root/.prefect
      HOME: /home/scraper
      PREFECT_HOME: /home/scraper/.prefect
      PREFECT_PROFILES_PATH: /home/scraper/.prefect/profiles.toml
      # Ensure Python can import the top-level `app` package
      PYTHONPATH: /app
      # Force UTF-8 mode — prevents encoding mismatches between local (Windows)
      # and Docker (Linux) when reading B3 CSV files.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      # Database connection — "db" is the Compose service name
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      # Connection pool
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      # Logging
      LOG_LEVEL: INFO
    shm_size: "1gb"
    volumes:
      - scraper_data:/app/data
    # Prefect-first command: serve daily/cotahist deployments
    command: ["/app/.venv/bin/python", "-m", "app.etl.orchestration.prefect.serve"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # API: FastAPI HTTP interface (optional — enable with: --profile api)
  #
  # Usage:
  #   docker compose --profile api up -d
  #   curl http://localhost:8000/health
  #   open http://localhost:8000/scalar
  # ---------------------------------------------------------------------------
  api:
    profiles: [api]
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: etlb3_api
    depends_on:
      db:
        condition: service_healthy
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      TZ: America/Sao_Paulo
      APP_ENV: production
      # Database connection — "db" is the Compose service name
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      # Shared data volume so the API can read raw files for /etl/run-latest
      B3_DATA_DIR: /app/data/raw
      LOG_LEVEL: INFO
      HOME: /home/scraper
      # Ensure Python can import the top-level `app` package
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - scraper_data:/app/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # COTAHIST: annual ZIP fetch + load into fact_cotahist_daily (profile cotahist)
  #
  # One-shot container: exits when the job finishes (restart: no).
  # Readiness: wait_for_db + poll until fact_cotahist_daily exists (apply migrations any way you choose).
  #
  #   docker compose --profile cotahist up -d
  #   docker compose --profile cotahist logs -f cotahist
  #   docker compose --profile cotahist run --rm cotahist   # re-run manually
  # ---------------------------------------------------------------------------
  cotahist:
    profiles: [cotahist]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: etlb3_cotahist
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: America/Sao_Paulo
      B3_DATA_DIR: /app/data/raw
      B3_COTAHIST_ANNUAL_DIR: /app/data/raw/b3/cotahist_annual
      HOME: /home/scraper
      PREFECT_HOME: /home/scraper/.prefect
      PREFECT_PROFILES_PATH: /home/scraper/.prefect/profiles.toml
      PYTHONPATH: /app
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
      DATABASE_URL: postgresql://etlb3:etlb3pass@db:5432/etlb3
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DB_POOL_RECYCLE: "1800"
      LOG_LEVEL: INFO
    volumes:
      - scraper_data:/app/data
    command: ["/app/.venv/bin/python", "/app/docker/cotahist_worker.py"]
    restart: "no"

volumes:
  db_data:
    driver: local
  scraper_data:
    driver: local
